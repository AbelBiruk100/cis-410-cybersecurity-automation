name: Hello Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build step
        run: echo "Building..."

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Test step
        run: echo "Testing..."

  deploy:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Deploy step
        run: echo "Deploying..."
