name: Snyk Security Scan

on:
  pull_request:
    branches: [ main ]

jobs:
  snyk-code:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Code Test
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test

  snyk-open-source:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Open Source Test
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

  snyk-container:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Container Test
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: corp-directory:latest
          command: container test
